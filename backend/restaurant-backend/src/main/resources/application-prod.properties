# Tắt hiển thị Swagger và các API Docs public trên Prod
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Prod must supply these values from the environment or secret manager.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
app.client.url=${CLIENT_URL}
app.admin.url=${ADMIN_URL}
app.cors.allowed-origins=${ALLOWED_ORIGINS}
app.upload.dir=${UPLOAD_DIR}
app.default.admin.phone=${DEFAULT_ADMIN_PHONE}
app.default.admin.password=${DEFAULT_ADMIN_PASSWORD}
app.default.admin.email=${DEFAULT_ADMIN_EMAIL}
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.url=${VNPAY_URL}
vnpay.return-url=${VNPAY_RETURN_URL}

# Tắt hibernate SQL log để tối ưu hiệu suất (giống tắt debug level ở Gunicorn)
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework.web=ERROR
