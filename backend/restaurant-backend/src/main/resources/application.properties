spring.application.name=restaurant-backend
spring.config.import=optional:file:.env[.properties]

# ─── Database ─────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# ─── Flyway ──────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ─── Mail ────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_USE_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_USE_TLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_USE_TLS:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}

# ─── Profile ─────────────────────────────────────────────────────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ─── Client URL ──────────────────────────────────────────────────
app.client.url=${CLIENT_URL:http://localhost:5173}

# ─── Admin mặc định ──────────────────────────────────────────────
app.default.admin.phone=${DEFAULT_ADMIN_PHONE}
app.default.admin.password=${DEFAULT_ADMIN_PASSWORD}
app.default.admin.email=${DEFAULT_ADMIN_EMAIL:admin@pizza.com}

# ─── VNPay (Sandbox/Production — cấu hình trong .env) ────────────
# Lấy từ https://sandbox.vnpayment.vn/devsupport/
vnpay.tmn-code=${VNPAY_TMN_CODE:DEMO1234}
vnpay.hash-secret=${VNPAY_HASH_SECRET:DEMOSECRET}
vnpay.url=${VNPAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:${CLIENT_URL:http://localhost:5173}/payment/vnpay-return}
vnpay.version=2.1.0
vnpay.command=pay
vnpay.currency-code=VND
vnpay.locale=vn
